<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark" style="background-color: #1a237e;">
    <div class="container">
        <span class="navbar-brand">Enterprise Fraud Detection Portal</span>
        <form th:action="@{/logout}" method="post" style="display:inline">
    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
</form>
    </div>
</nav>

<div class="container mt-4">
    <h2>Welcome!</h2>
    <p class="text-muted">You are logged in as Customer</p>

    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card text-white bg-primary">
                <div class="card-body">
                    <h5 class="card-title">My Transactions</h5>
                    <h2>0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-warning">
                <div class="card-body">
                    <h5 class="card-title">Pending</h5>
                    <h2>0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-success">
                <div class="card-body">
                    <h5 class="card-title">Approved</h5>
                    <h2>0</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-md-4">
            <a href="/customer/transaction/new"class="btn btn-primary w-100">
                New Transaction
            </a>
        </div>
        <div class="col-md-4">
            <a href="/customer/transaction/history"class="btn btn-outline-primary w-100">
                Transaction History
            </a>
        </div>
    </div>
</div>
</body>
</html>
