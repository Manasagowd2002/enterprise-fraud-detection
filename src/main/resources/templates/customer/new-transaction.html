<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Transaction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark" style="background-color: #1a237e;">
    <div class="container">
        <span class="navbar-brand">Enterprise Fraud Detection Portal</span>
        <div>
            <a href="/customer/dashboard" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
            <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header text-white"
                     style="background-color: #1a237e;">
                    <h5 class="mb-0">New Transaction</h5>
                </div>
                <div class="card-body p-4">

                    <div th:if="${error}"
                         class="alert alert-danger"
                         th:text="${error}">
                    </div>

                    <form th:action="@{/customer/transaction/submit}"
                          th:object="${transaction}"
                          method="post">

                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                Receiver Account Number
                            </label>
                            <input type="text"
                                   th:field="*{receiverAccount}"
                                   class="form-control"
                                   id="receiverAccount"
                                   placeholder="Enter Account Number (Example: ACT-2026-0001)"
                                   maxlength="13"
                                   onkeyup="validateAccountNumber()"
                                   oninput="this.value = this.value.toUpperCase()"
                                   required>
                            <div id="accountError"
                                 class="invalid-feedback"
                                 style="display:none">
                            </div>
                            <small class="text-muted">
                                Format: ACT-YYYY-XXXX
                                (Example: ACT-2026-0001)
                            </small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                Receiver Name
                            </label>
                            <input type="text"
                                   th:field="*{receiverName}"
                                   class="form-control"
                                   placeholder="Enter receiver name"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                Amount (₹)
                            </label>
                            <input type="number"
                                   th:field="*{amount}"
                                   class="form-control"
                                   placeholder="Enter amount"
                                   step="0.01"
                                   min="1"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                Description (optional)
                            </label>
                            <textarea th:field="*{description}"
                                      class="form-control"
                                      rows="2"
                                      placeholder="Purpose of transaction">
                            </textarea>
                        </div>

                        <button type="button"
                                class="btn btn-primary w-100"
                                onclick="validateAndSubmitTransaction()">
                            Submit Transaction
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function validateAccountNumber() {
    const account = document.getElementById(
        'receiverAccount').value.trim();
    const error = document.getElementById('accountError');
    const currentYear = new Date().getFullYear();
    const pattern = new RegExp(
        '^ACT-' + currentYear + '-\\d{4}$');

    if (account.length === 0) {
        error.textContent = 'Account number is required';
        error.style.display = 'block';
        return false;
    }

    if (account !== account.toUpperCase()) {
        error.textContent =
            'Use uppercase only. Example: ACT-2026-0001';
        error.style.display = 'block';
        return false;
    }

    if (!pattern.test(account)) {
        error.textContent =
            'Account number must be in format ACT-' +
            currentYear +
            '-XXXX. Example: ACT-2026-0001';
        error.style.display = 'block';
        return false;
    }

    error.style.display = 'none';
    return true;
}

function validateAndSubmitTransaction() {
    let valid = true;

    if (!validateAccountNumber()) {
        valid = false;
    }

    const receiverName = document.querySelector(
        '[name="receiverName"]').value.trim();
    const amount = document.querySelector(
        '[name="amount"]').value;

    if (receiverName.length < 2) {
        alert('Please enter receiver name');
        valid = false;
    }

    if (!amount || parseFloat(amount) <= 0) {
        alert('Please enter a valid amount');
        valid = false;
    }

    if (valid) {
        document.querySelector('form').submit();
    }
}
</script>
</body>
</html>
