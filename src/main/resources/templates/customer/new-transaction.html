<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Transaction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark" style="background-color: #1a237e;">
    <div class="container">
        <span class="navbar-brand">Enterprise Fraud Detection Portal</span>
        <div>
            <a href="/customer/dashboard" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
            <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header text-white"
                     style="background-color: #1a237e;">
                    <h5 class="mb-0">New Transaction</h5>
                </div>
                <div class="card-body p-4">

                    <div th:if="${error}"
                         class="alert alert-danger"
                         th:text="${error}">
                    </div>

                    <form th:action="@{/customer/transaction/submit}"
                          th:object="${transaction}"
                          method="post">

                        <div class="mb-3">
                            <label class="form-label">
                                Receiver Account Number
                            </label>
                            <input type="text"
                                   th:field="*{receiverAccount}"
                                   class="form-control"
                                   placeholder="Enter account number"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Receiver Name
                            </label>
                            <input type="text"
                                   th:field="*{receiverName}"
                                   class="form-control"
                                   placeholder="Enter receiver name"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Amount (₹)
                            </label>
                            <input type="number"
                                   th:field="*{amount}"
                                   class="form-control"
                                   placeholder="Enter amount"
                                   step="0.01"
                                   min="1"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Description (optional)
                            </label>
                            <textarea th:field="*{description}"
                                      class="form-control"
                                      rows="2"
                                      placeholder="Purpose of transaction">
                            </textarea>
                        </div>

                        <button type="submit"
                                class="btn btn-primary w-100">
                            Submit Transaction
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
