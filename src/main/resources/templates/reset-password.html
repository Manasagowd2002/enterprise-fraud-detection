<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .card {
            max-width: 420px;
            margin: 80px auto;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .card-header {
            background-color: #1a237e;
            color: white;
            border-radius: 12px 12px 0 0 !important;
            padding: 20px;
            text-align: center;
        }
        .rule { padding: 2px 0; font-size: 12px; }
        .rule.valid { color: #198754; }
        .rule.invalid { color: #dc3545; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <h4>Reset Password</h4>
            <small>Enterprise Fraud Detection Portal</small>
        </div>
        <div class="card-body p-4">

            <div th:if="${error}"
                 class="alert alert-danger"
                 th:text="${error}">
            </div>

            <form th:action="@{/reset-password}"
                  method="post"
                  id="resetForm">

                <input type="hidden"
                       name="email"
                       th:value="${email}">

                <div class="mb-3">
                    <label class="form-label fw-bold">
                        New Password
                    </label>
                    <input type="password"
                           name="newPassword"
                           id="newPassword"
                           class="form-control"
                           placeholder="Enter new password"
                           onkeyup="checkPwd()"
                           required>
                    <div class="mt-2">
                        <div class="rule" id="r1">✗ Minimum 8 characters</div>
                        <div class="rule" id="r2">✗ At least 1 uppercase</div>
                        <div class="rule" id="r3">✗ At least 1 lowercase</div>
                        <div class="rule" id="r4">✗ At least 1 number</div>
                        <div class="rule" id="r5">✗ At least 1 special character</div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">
                        Confirm New Password
                    </label>
                    <input type="password"
                           name="confirmPassword"
                           id="confirmPassword"
                           class="form-control"
                           placeholder="Re-enter new password"
                           onkeyup="checkMatch()"
                           required>
                    <div id="matchError"
                         class="text-danger"
                         style="display:none;font-size:13px">
                        Passwords do not match
                    </div>
                </div>

                <button type="button"
                        class="btn btn-primary w-100"
                        onclick="submitReset()">
                    Reset Password
                </button>
            </form>
        </div>
    </div>
</div>

<script>
function checkPwd() {
    const p = document.getElementById('newPassword').value;
    const rules = [
        { id: 'r1', ok: p.length >= 8,
          label: 'Minimum 8 characters' },
        { id: 'r2', ok: /[A-Z]/.test(p),
          label: 'At least 1 uppercase' },
        { id: 'r3', ok: /[a-z]/.test(p),
          label: 'At least 1 lowercase' },
        { id: 'r4', ok: /[0-9]/.test(p),
          label: 'At least 1 number' },
        { id: 'r5', ok: /[!@#$%^&*(),.?":{}|<>]/.test(p),
          label: 'At least 1 special character' }
    ];
    rules.forEach(r => {
        const el = document.getElementById(r.id);
        el.className = 'rule ' + (r.ok ? 'valid' : 'invalid');
        el.innerHTML = (r.ok ? '✓ ' : '✗ ') + r.label;
    });
}

function checkMatch() {
    const p = document.getElementById('newPassword').value;
    const c = document.getElementById('confirmPassword').value;
    const err = document.getElementById('matchError');
    err.style.display = (c && p !== c) ? 'block' : 'none';
}

function submitReset() {
    const p = document.getElementById('newPassword').value;
    const c = document.getElementById('confirmPassword').value;

    const strong = p.length >= 8
        && /[A-Z]/.test(p) && /[a-z]/.test(p)
        && /[0-9]/.test(p)
        && /[!@#$%^&*(),.?":{}|<>]/.test(p);

    if (!strong) {
        alert('Password does not meet security requirements');
        return;
    }
    if (p !== c) {
        alert('Passwords do not match');
        return;
    }
    document.getElementById('resetForm').submit();
}
</script>
</body>
</html>
