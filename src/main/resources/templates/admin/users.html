<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark" style="background-color: #1a237e;">
    <div class="container">
        <span class="navbar-brand">Enterprise Fraud Detection Portal</span>
        <div>
            <a href="/admin/dashboard" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
            <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div th:if="${success}"
         class="alert alert-success"
         th:text="${success}">
    </div>

    <h3>Pending Approvals</h3>
    <table class="table table-bordered table-hover mt-3">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Full Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Registered</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="user : ${pendingUsers}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.fullName}"></td>
                <td th:text="${user.email}"></td>
                <td th:text="${user.phone}"></td>
                <td th:text="${user.createdAt}"></td>
                <td>
                    <form th:action="@{/admin/users/approve/{id}(id=${user.id})}"
                          method="post" style="display:inline">
                        <button type="submit"
                                class="btn btn-success btn-sm">
                            Approve
                        </button>
                    </form>
                    <form th:action="@{/admin/users/reject/{id}(id=${user.id})}"
                          method="post" style="display:inline">
                        <button type="submit"
                                class="btn btn-danger btn-sm">
                            Reject
                        </button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(pendingUsers)}">
                <td colspan="6" class="text-center text-muted">
                    No pending approvals
                </td>
            </tr>
        </tbody>
    </table>

    <h3 class="mt-5">All Users</h3>
    <table class="table table-bordered table-hover mt-3">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Full Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="user : ${allUsers}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.fullName}"></td>
                <td th:text="${user.email}"></td>
                <td th:text="${user.role}"></td>
                <td>
                    <span th:text="${user.status}"
                          th:class="${user.status.name() == 'ACTIVE'} ? 'badge bg-success' :
                                    (${user.status.name() == 'PENDING'} ? 'badge bg-warning' :
                                    'badge bg-danger')">
                    </span>
                </td>
                <td>
                    <form th:action="@{/admin/users/freeze/{id}(id=${user.id})}"
                          method="post" style="display:inline">
                        <button type="submit"
                                class="btn btn-warning btn-sm"
                                th:if="${user.status.name() == 'ACTIVE'}">
                            Freeze
                        </button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
