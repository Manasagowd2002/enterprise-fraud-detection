<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .card {
            max-width: 420px;
            margin: 100px auto;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .card-header {
            background-color: #1a237e;
            color: white;
            border-radius: 12px 12px 0 0 !important;
            padding: 20px;
            text-align: center;
        }
        .otp-input {
            font-size: 24px;
            letter-spacing: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <h4>Enter OTP</h4>
            <small>Enterprise Fraud Detection Portal</small>
        </div>
        <div class="card-body p-4">

            <div th:if="${error}"
                 class="alert alert-danger"
                 th:text="${error}">
            </div>

            <div th:if="${success}"
                 class="alert alert-success"
                 th:text="${success}">
            </div>

            <p class="text-muted mb-3">
                Enter the 6 digit OTP sent to your email.
                OTP is valid for 5 minutes only.
            </p>

            <form th:action="@{/verify-otp}" method="post">

                <input type="hidden"
                       name="email"
                       th:value="${email}">

                <div class="mb-3">
                    <label class="form-label fw-bold">
                        OTP Code
                    </label>
                    <input type="text"
                           name="otp"
                           class="form-control otp-input"
                           placeholder="000000"
                           maxlength="6"
                           required>
                </div>

                <button type="submit"
                        class="btn btn-primary w-100">
                    Verify OTP
                </button>
            </form>

            <hr>
            <p class="text-center mb-0">
                Did not receive OTP?
                <a th:href="@{/forgot-password}">
                    Request again
                </a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
